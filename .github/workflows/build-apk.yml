name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install npm dependencies
        run: npm install

      - name: Add Android platform (fresh scaffold each build)
        run: npx cap add android

      - name: Sync web assets into native project
        run: npx cap sync android

      - name: Patch native project with SOS plugin + permissions
        run: |
          chmod +x scripts/patch-android.sh
          bash scripts/patch-android.sh

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: rakshak-sos-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
